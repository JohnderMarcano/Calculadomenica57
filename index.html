<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punto de Venta - Mamá</title>
    <link rel="icon" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; }
        .contenedor { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        label { font-weight: bold; display: block; margin-top: 15px; }
        input, select, button { width: 100%; margin-top: 5px; padding: 10px; box-sizing: border-box; border-radius: 5px; border: 1px solid #ccc; }
        button { background-color: #007bff; color: white; font-weight: bold; border: none; cursor: pointer; margin-top: 15px; }
        button:hover { background-color: #0056b3; }
        .btn-limpiar { background-color: #dc3545; margin-top: 10px; }
        .btn-limpiar:hover { background-color: #c82333; }
        .estado-api { font-size: 0.8em; color: #666; margin-top: 5px; text-align: right; }
        
        /* Estilos para la lista de compras */
        #lista-compras { list-style-type: none; padding: 0; margin-top: 20px; border-top: 2px solid #eee; }
        #lista-compras li { padding: 10px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        
        #totales { font-size: 1.2em; font-weight: bold; margin-top: 20px; color: #333; padding: 15px; background-color: #e2e3e5; border-radius: 5px; text-align: right; }
        .total-bs { color: #28a745; font-size: 1.1em; }
    </style>
</head>
<body>

    <div class="contenedor">
        <h2>Calculadora de Pedidos</h2>

        <label for="tasaBcv">Tasa BCV (Bs/$):</label>
        <input type="number" id="tasaBcv" step="0.01" placeholder="Cargando tasa..." onchange="actualizarTotales()">
        <div id="estadoApi" class="estado-api">Conectando con el BCV...</div>

        <label for="producto">Producto:</label>
        <select id="producto">
            <option value="1.80">Jabón Líquido ($1.80 / Litro)</option>
            <option value="2.00">Suavizante ($2.00 / Litro)</option>
            <option value="2.00">Desengrasante ($2.00 / Litro)</option>
            <option value="0.80">Cloro ($0.80 / Litro)</option>
            <option value="0.90">Desinfectante ($0.90 / Litro)</option>
            <option value="2.00">Cera ($2.00 / Litro)</option>
        </select>

        <label for="litros">Cantidad de Litros:</label>
        <input type="number" id="litros" step="0.1" placeholder="Ej: 0.5 para medio litro">

        <button onclick="agregarAlCarrito()">➕ Agregar a la cuenta</button>

        <ul id="lista-compras"></ul>

        <div id="totales">
            Total USD: $0.00 <br>
            <span class="total-bs">Total Bs: 0.00</span>
        </div>

        <button class="btn-limpiar" onclick="limpiarCuenta()">🗑️ Nueva Venta (Borrar todo)</button>
    </div>

    <script>
        // Arreglo para guardar los productos que se van sumando
        let carrito = [];

        // Función para obtener el BCV automáticamente
        async function obtenerTasaBCV() {
            const inputTasa = document.getElementById('tasaBcv');
            const estadoApi = document.getElementById('estadoApi');

            try {
                const respuesta = await fetch('https://ve.dolarapi.com/v1/dolares/oficial');
                if (!respuesta.ok) throw new Error('Error en la red');
                const datos = await respuesta.json();
                
                inputTasa.value = datos.promedio;
                estadoApi.innerHTML = "✅ Tasa BCV actualizada";
                estadoApi.style.color = "green";
                // Si ya hay cosas en el carrito, actualiza los bolívares con la nueva tasa
                actualizarTotales(); 
            } catch (error) {
                console.error("Error obteniendo la tasa:", error);
                estadoApi.innerHTML = "❌ Error. Ingresa la tasa manual.";
                estadoApi.style.color = "red";
            }
        }

        obtenerTasaBCV();

        // Función principal: Agregar al carrito
        function agregarAlCarrito() {
            const selectProducto = document.getElementById('producto');
            const litrosInput = document.getElementById('litros');
            
            const precioPorLitro = parseFloat(selectProducto.value);
            const litros = parseFloat(litrosInput.value);
            // Obtenemos el nombre del producto seleccionado (ej: "Cloro")
            const nombreProducto = selectProducto.options[selectProducto.selectedIndex].text.split(" (")[0];

            if (isNaN(litros) || litros <= 0) {
                alert("Por favor, ingresa una cantidad válida de litros (ej: 0.5 o 1).");
                return;
            }

            const subtotal = precioPorLitro * litros;

            // Guardamos el producto en nuestro arreglo (memoria)
            carrito.push({
                nombre: nombreProducto,
                cantidad: litros,
                subtotal: subtotal
            });

            // Limpiamos el input de litros para el siguiente producto
            litrosInput.value = '';
            
            // Actualizamos la pantalla
            mostrarCarrito();
            actualizarTotales();
        }

        // Función para mostrar la lista en el HTML
        function mostrarCarrito() {
            const listaHTML = document.getElementById('lista-compras');
            listaHTML.innerHTML = ''; // Limpiamos la lista antes de volver a pintarla

            carrito.forEach(item => {
                const li = document.createElement('li');
                li.innerHTML = `<span>${item.cantidad}L de ${item.nombre}</span> <span>$${item.subtotal.toFixed(2)}</span>`;
                listaHTML.appendChild(li);
            });
        }

        // Función para calcular y mostrar los totales
        function actualizarTotales() {
            let totalDolares = 0;
            
            // Sumamos todos los subtotales del carrito
            carrito.forEach(item => {
                totalDolares += item.subtotal;
            });

            const tasaBcv = parseFloat(document.getElementById('tasaBcv').value) || 0;
            const totalBolivares = totalDolares * tasaBcv;

            document.getElementById('totales').innerHTML = `
                Total USD: $${totalDolares.toFixed(2)} <br>
                <span class="total-bs">Total Bs: ${totalBolivares.toFixed(2)}</span>
            `;
        }

        // Función para vaciar la cuenta para un nuevo cliente
        function limpiarCuenta() {
            carrito = []; // Vaciamos el arreglo
            mostrarCarrito();
            actualizarTotales();
        }
    </script>

</body>

</html>
